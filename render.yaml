databases:
  - name: chess-postgres
    databaseName: chess
    plan: free
    region: oregon

services:
  - type: redis
    name: chess-redis
    plan: free
    region: oregon
    ipAllowList: []

  - type: web
    name: chess-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: DATABASE_URL
        fromDatabase:
          name: chess-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chess-redis
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
