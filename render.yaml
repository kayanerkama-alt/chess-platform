services:
  - type: web
    name: ucx-chess-platform
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/chess.db
    disk:
      name: chess-data
      mountPath: /data
      sizeGB: 1
